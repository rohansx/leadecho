# OpenCodeReview — auto-review PRs with MiniMax
#
# Place at: .github/workflows/ocr-review.yml
#
# Required repo secret (Settings -> Secrets and variables -> Actions):
#   MINIMAX_API_KEY   your MiniMax API key (from api.minimax.io, matching the endpoint below)
#
# Triggers:
#   - PR opened / reopened  -> auto review
#   - a PR comment starting with "/open-code-review" -> re-run on demand
#   (add "synchronize" to the types list to also review every new push — costs more)
#
# Notes:
#   - Uses pull_request_target so fork PRs can access the secret. Safe here because
#     ocr only READS the diff; it never executes PR code. Do not add steps that run
#     PR code under this trigger.
#   - GITHUB_TOKEN is provided automatically (needs pull-requests: write).

name: OpenCodeReview

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request_target:
    types: [opened, reopened]     # add: synchronize  -> to review on every push
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request_target' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '/open-code-review'))
    steps:
      - name: Resolve PR refs (for comment-triggered runs)
        id: pr
        if: github.event_name != 'pull_request_target'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('head_sha', pr.head.sha);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for merge-base diff
          ref: ${{ github.event.pull_request.head.sha || steps.pr.outputs.head_sha }}

      - name: Fetch PR head (covers fork PRs)
        run: git fetch origin pull/${{ github.event.pull_request.number || github.event.issue.number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install OpenCodeReview
        run: |
          npm install -g @alibaba-group/open-code-review
          ocr version || true

      - name: Configure OCR (MiniMax)
        run: |
          # OpenAI-compatible endpoint (international). If your key only works on the
          # Anthropic-compatible endpoint, use:
          #   url = https://api.minimax.io/anthropic/v1/messages   and   use_anthropic true
          # China platform accounts: swap api.minimax.io -> api.minimaxi.com
          ocr config set llm.url https://api.minimax.io/v1/chat/completions
          ocr config set llm.auth_token "${{ secrets.MINIMAX_API_KEY }}"
          ocr config set llm.model MiniMax-M2.7
          ocr config set llm.use_anthropic false     # MUST be false for the /v1 endpoint (default is true)

      - name: Run review
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_REF="${{ steps.pr.outputs.base_ref }}"
            HEAD_SHA="${{ steps.pr.outputs.head_sha }}"
          fi
          echo "Reviewing ${HEAD_SHA} vs origin/${BASE_REF}"
          ocr review \
            --from "origin/${BASE_REF}" \
            --to "${HEAD_SHA}" \
            --format json \
            --concurrency 2 \
            > /tmp/ocr-result.json 2> /tmp/ocr-stderr.log || true
          echo "----- ocr stdout -----"; cat /tmp/ocr-result.json || true
          echo "----- ocr stderr -----"; cat /tmp/ocr-stderr.log || true

      - name: Post comments to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const prNumber = context.issue.number;
            const commitSha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : (await github.rest.pulls.get({
                  owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber,
                })).data.head.sha;

            const issueComment = (body) => github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber, body,
            });

            // Parse ocr output
            let result;
            try {
              result = JSON.parse(fs.readFileSync('/tmp/ocr-result.json', 'utf8'));
            } catch (e) {
              const stderr = (fs.readFileSync('/tmp/ocr-stderr.log', 'utf8') || '').trim();
              await issueComment(`⚠️ **OpenCodeReview** could not run.\n\n\`\`\`\n${stderr.slice(0, 6000)}\n\`\`\``);
              return;
            }

            const comments = result.comments || [];
            if (comments.length === 0) {
              await issueComment(`✅ **OpenCodeReview**: ${result.message || 'No issues found. LGTM.'}`);
              return;
            }

            // Build inline review comments (RIGHT side of the diff)
            const inline = [];
            const noLine = [];
            for (const c of comments) {
              let body = c.content || '';
              if (c.suggestion_code && c.existing_code) {
                body += '\n\n**Suggestion:**\n```suggestion\n' + c.suggestion_code + '\n```';
              }
              const hasLine = (c.start_line >= 1) || (c.end_line >= 1);
              if (!hasLine) { noLine.push({ c, body }); continue; }
              const rc = { path: c.path, body, side: 'RIGHT' };
              if (c.start_line >= 1 && c.end_line >= 1 && c.start_line !== c.end_line) {
                rc.start_line = c.start_line; rc.start_side = 'RIGHT'; rc.line = c.end_line;
              } else {
                rc.line = c.end_line >= 1 ? c.end_line : c.start_line;
              }
              inline.push(rc);
            }

            let summary = `🔍 **OpenCodeReview** found **${comments.length}** issue(s).`;
            summary += `\n- ${inline.length} inline · ${noLine.length} in summary`;
            for (const { c, body } of noLine) {
              summary += `\n\n---\n\n**\`${c.path}\`**${c.start_line ? ` (L${c.start_line}${c.end_line ? '-L' + c.end_line : ''})` : ''}\n\n${body}`;
            }

            // Post one review with all inline comments; fall back to a plain comment if the API rejects them
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner, repo: context.repo.repo,
                pull_number: prNumber, commit_id: commitSha,
                body: summary, event: 'COMMENT', comments: inline,
              });
            } catch (e) {
              let dump = summary + `\n\n> Could not attach inline comments (${e.message}); listing them here:`;
              for (const rc of inline) {
                dump += `\n\n---\n\n**\`${rc.path}\`** (L${rc.line})\n\n${rc.body}`;
              }
              await issueComment(dump.slice(0, 60000));
            }
