server {
    listen 3100;
    server_name _;

    # Landing page (Astro static build)
    root /usr/share/nginx/landing;
    index index.html;

    # Landing page routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Dashboard SPA at /app
    location /app/ {
        alias /usr/share/nginx/dashboard/;
        try_files $uri $uri/ /app/index.html;
    }

    # Dashboard assets
    location /app/assets/ {
        alias /usr/share/nginx/dashboard/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Docs pages (Astro static)
    location /docs/ {
        alias /usr/share/nginx/landing/docs/;
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # UTM redirect
    location /r/ {
        proxy_pass http://api:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
